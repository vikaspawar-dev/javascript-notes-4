<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays in JS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #020617, #1e293b);
            color: #e2e8f0;
        }

        h1 {
            color: #facc15; /* yellow */
        }

        h2 {
            color: #38bdf8; /* blue */
        }

        p {
            color: #f97316; /* orange */
            font-weight: bold;
        }

        pre {
            background-color: #020617;
            color: #4ade80; /* green */
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #22c55e;
        }
    </style>
</head>

<body>

    <h1>Arrays in JS</h1>

    <p>Collections of items</p>

    <h2>Create Array</h2>

    <pre>
let heroes = ["ironman",
"hulk",
"thor",
"batman"];

let marks = [96, 75, 48, 83, 66];

let info = ["rahul",
86,
"Delhi"];
    </pre>
<script src="ArrayJs.js"></script>
</body>
</html>
