<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Indices</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #020617, #1e293b);
            color: #e2e8f0;
        }

        h1 {
            color: #facc15;
        }

        h2 {
            color: #38bdf8;
        }

        p {
            color: #f97316;
            font-weight: bold;
        }

        .index-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .box {
            background-color: #ef4444; /* red */
            color: white;
            padding: 8px 12px;
            border-radius: 8px; /* radius */
            font-weight: bold;
        }

        .values {
            display: flex;
            gap: 25px;
            margin-top: 10px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Arrays in JS</h1>

    <h2>Array Indices</h2>

    <p>arr[ 0 ], arr[ 1 ], arr[ 2 ]</p>

    <!-- Index Boxes -->
    <div class="index-container">
        <div class="box">0</div>
        <div class="box">1</div>
        <div class="box">2</div>
         <div class="box">3</div>
          <div class="box">4</div>
    </div>

    <div class="card">
    <h2>Array Indices</h2>

    <p>arr[0], arr[1], arr[2] ....</p>

    <!-- Index Boxes -->
    <div class="index-container">
        <div class="box">0</div>
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>

    <!-- Values -->
    <div class="value-container">
        <div class="value">A</div>
        <div class="value">B</div>
        <div class="value">C</div>
        <div class="value">D</div>
        <div class="value">E</div>
    </div>
</div>
<script src="IndiceJs.js"></script>
</body>
</html>
